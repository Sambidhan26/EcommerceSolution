services:
  api:
    build:
      context: .
      dockerfile: Ecommerce.API/Dockerfile
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=EcommerceDockerDb;User Id=sa;Password=YourStrong@Passw0rd2026!;TrustServerCertificate=True;"
      Jwt__Key: ThisIsMySuperSecretKeyForJwtAuthentication12345_Development_Docker
      Jwt__Issuer: Ecommerce.API
      Jwt__Audience: Ecommerce.Client
      Jwt__DurationInMinutes: 60
    depends_on:
      sqlserver:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "14333:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd2026!"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"YourStrong@Passw0rd2026!\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
